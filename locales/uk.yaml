start: |
  👋 Вітаю. *Voicy* перетворює голосові повідомлення й аудіофайли (.ogg, .flac, .wav, .mp3) на текст.

  Надішліть голосове повідомлення, і Voicy перетворить його на текст. Використовуйте /language, щоб змінити мову інтерфейсу бота.

  Старий бот із вибором рушія доступний у @voicy\_legacy\_bot. Voicy має відкритий код: https://github.com/backmeupplz/voicy. Для підтримки приєднуйтесь до @golden\_borodutch\_chat.
