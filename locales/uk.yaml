pay: |
  Voicy перетворює аудіо на текст за допомогою локальних обчислень. Це зберігає розшифрування приватним і не надсилає ваше аудіо до сторонніх API для транскрибації.

  Локальні обчислення коштують грошей. Одноразовий донат активує Voicy для цього чату й допомагає нам додати більше обчислювальної потужності.

  Донати прив'язані до чату, а не до користувача. Якщо ви донатите в приватних повідомленнях із Voicy, Voicy активується у вашому приватному чаті. Якщо хочете активувати групу, запустіть /donate у цій групі.

  Виберіть суму в Telegram Stars нижче. Оплата через Stripe теж доступна: надішліть <code>/donate 15.69</code>, щоб заплатити будь-яку суму з мінімумом $6.99. Також можна надіслати токени на суму щонайменше $6.99 на <code>borodutch.eth</code> і переслати транзакцію @borodutch.
pay_custom: |
