help: |
  😎 *Voicy* перетворює голосові повідомлення й аудіофайли (.ogg, .flac, .wav, .mp3) на текст.

  Надішліть голосове повідомлення в приватному чаті або додайте Voicy до групи. У групах Voicy може перетворювати кожне голосове повідомлення на текст або чекати, доки хтось відповість на повідомлення командою /transcribe.

  /start — запустити Voicy
  /help — показати це повідомлення
  /id — показати ID чату й користувача
  /language — змінити мову інтерфейсу бота
  /donate — активувати розшифрування голосу для цього чату
  /files — увімкнути або вимкнути аудіофайли
  /silent — увімкнути або вимкнути додаткові статусні повідомлення
  /lock — дозволити команди лише адміністраторам групи
  /transcribe\_all — перетворювати кожне голосове повідомлення в цій групі на текст
  /transcribe — перетворити голосове або аудіоповідомлення, на яке ви відповіли, на текст
  /privacy — відкрити політику приватності

  Voicy тепер використовує воркери, щоб перетворювати повідомлення на текст. Старий бот із вибором рушія доступний у @voicy\_legacy\_bot. Voicy має відкритий код: https://github.com/backmeupplz/voicy. Для підтримки приєднуйтесь до @golden\_borodutch\_chat.
