files_false: "📁 O Voicy vai ignorar arquivos de áudio neste chat."
files_true: "📁 O Voicy vai transformar arquivos de áudio compatíveis deste chat em texto."
help: |
  😎 *Voicy* transforma mensagens de voz e arquivos de áudio (.ogg, .flac, .wav, .mp3) em texto.

  Envie uma mensagem de voz em um chat privado ou adicione o Voicy a um grupo. Em grupos, o Voicy pode transformar todas as mensagens de voz em texto ou esperar alguém responder a uma mensagem com /transcribe.

  /start — iniciar o Voicy
  /help — mostrar esta mensagem
  /id — mostrar IDs do chat e do usuário
  /language — alterar o idioma da interface do bot
  /donate — ativar a transcrição de voz para este chat
  /files — ativar ou desativar arquivos de áudio
  /silent — ativar ou desativar mensagens de status extras
  /lock — restringir comandos a admins do grupo
  /transcribe\_all — transformar todas as mensagens de voz deste grupo em texto
  /transcribe — transformar em texto a mensagem de voz ou áudio respondida
  /privacy — abrir a política de privacidade

  O Voicy agora usa workers para transformar mensagens em texto. O Voicy é open source: https://github.com/backmeupplz/voicy.
error_group: "😅 Este comando só funciona em chats de grupo."
lock_true: "🔑 Agora o Voicy aceitará comandos apenas de admins do grupo."
lock_false: "🔑 Agora o Voicy aceitará comandos de qualquer pessoa neste chat."
silent_true: "😶 O modo silencioso está ativado. O Voicy só enviará o texto final."
silent_false: "😏 O modo silencioso está desativado. O Voicy enviará mensagens de status enquanto transforma áudio em texto."
start: |
  👋 Olá. *Voicy* transforma mensagens de voz e arquivos de áudio (.ogg, .flac, .wav, .mp3) em texto.

  Envie uma mensagem de voz e o Voicy vai transformá-la em texto. Use /language para alterar o idioma da interface do bot.

  O Voicy é open source: https://github.com/backmeupplz/voicy.
