pay: |
  O Voicy transforma áudio em texto usando computação local. Isso mantém a transcrição privada e evita enviar seu áudio para APIs de transcrição de terceiros.

  Executar computação local custa dinheiro. Uma doação única ativa o Voicy neste chat e nos ajuda a adicionar mais capacidade de computação.

  As doações são por chat, não por usuário. Se você doar em mensagens privadas com o Voicy, ele será ativado no seu chat privado. Se quiser ativar um grupo, execute /donate dentro desse grupo.

  Escolha uma opção abaixo ou envie <code>/donate 15.69</code> para pagar qualquer valor com mínimo de $6.99. Você também pode enviar tokens no valor de pelo menos $6.99 para <code>borodutch.eth</code> e enviar a transação para @borodutch.
pay_custom: |
  Doe <b>${amount}</b> para ativar a transcrição de voz neste chat.

  Só este chat será ativado.
pay_amount_too_low: |
  A doação mínima é <b>${amount}</b>.

  Envie <code>/donate ${amount}</code> ou escolha uma opção com /donate.
