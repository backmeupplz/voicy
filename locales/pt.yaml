start: |
  👋 Olá. *Voicy* transforma mensagens de voz e arquivos de áudio (.ogg, .flac, .wav, .mp3) em texto.

  Envie uma mensagem de voz e o Voicy vai transformá-la em texto. Use /language para alterar o idioma da interface do bot.

  O Voicy é open source: https://github.com/backmeupplz/voicy.
