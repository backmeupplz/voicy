files_false: "\U0001F4C1 Войси будет игнорировать аудиофайлы в этом чате."
files_true: "\U0001F4C1 Войси будет превращать поддерживаемые аудиофайлы из этого чата в текст."
help: |
  😎 *Войси* превращает голосовые сообщения и аудиофайлы (.ogg, .flac, .wav, .mp3) в текст.

  Отправьте голосовое сообщение в личный чат или добавьте Войси в группу. В группах Войси может превращать все голосовые сообщения в текст или ждать, пока кто-нибудь ответит на сообщение командой /transcribe.

  /start — запустить Войси
  /help — показать это сообщение
  /language — сменить язык интерфейса бота
  /donate — помочь оплачивать превращение голосовых сообщений в текст
  /files — включить или выключить аудиофайлы
  /silent — включить или выключить статусные сообщения
  /lock — разрешить команды только админам группы
  /transcribe\_all — превращать все голосовые в группе в текст
  /transcribe — превратить голосовое или аудиосообщение, на которое вы ответили, в текст
  /privacy — открыть политику приватности

  Войси теперь использует воркеры, чтобы превращать сообщения в текст. Старая версия с выбором движка доступна в @voicy_legacy_bot.
error_group: "\U0001F605 Эта команда работает только в групповых чатах."
lock_true: "\U0001F511 Теперь Войси будет принимать команды только от админов группы."
lock_false: "\U0001F511 Теперь Войси будет принимать команды от любого участника этого чата."
silent_true: "\U0001F636 Тихий режим включен. Войси будет отправлять только готовый текст."
silent_false: "\U0001F60F Тихий режим выключен. Войси будет отправлять статусные сообщения, пока превращает аудио в текст."
start: |
  👋 Здравствуйте. *Войси* превращает голосовые сообщения и аудиофайлы (.ogg, .flac, .wav, .mp3) в текст.

  Отправьте голосовое сообщение, и Войси превратит его в текст. Команда /language меняет язык интерфейса бота.

  Старая версия с выбором движка доступна в @voicy_legacy_bot.
