files_false: "\U0001F4C1 Войси будет игнорировать аудиофайлы в этом чате."
files_true: "\U0001F4C1 Войси будет ставить поддерживаемые аудиофайлы из этого чата в очередь на расшифровку."
help: |
  😎 *Войси* превращает голосовые сообщения и аудиофайлы (.ogg, .flac, .wav, .mp3) в текст.

  Отправьте голосовое сообщение в личный чат или добавьте Войси в группу. В группах Войси может расшифровывать все голосовые сообщения или ждать, пока кто-нибудь ответит на сообщение командой /transcribe.

  /help — показать это сообщение
  /language — сменить язык интерфейса бота
  /donate — помочь оплатить вычисления для расшифровки
  /files — включить или выключить расшифровку аудиофайлов
  /silent — включить или выключить статусные сообщения
  /lock — разрешить команды только админам группы
  /privacy — открыть политику приватности
  /transcribe\_all — включить или выключить расшифровку всех голосовых в группе
  /transcribe — расшифровать голосовое или аудиосообщение, на которое вы ответили

  Войси теперь использует очередь и воркеры для расшифровки. Старая версия с выбором движка доступна в @voicy_legacy_bot.
error_group: "\U0001F605 Эта команда работает только в групповых чатах."
lock_true: "\U0001F511 Теперь Войси будет принимать команды только от админов группы."
lock_false: "\U0001F511 Теперь Войси будет принимать команды от любого участника этого чата."
silent_true: "\U0001F636 Тихий режим включен. Войси будет отправлять только готовые расшифровки."
silent_false: "\U0001F60F Тихий режим выключен. Войси будет отправлять сообщения об очереди и статусе."
start: |
  👋 Здравствуйте. *Войси* превращает голосовые сообщения и аудиофайлы (.ogg, .flac, .wav, .mp3) в текст.

  Отправьте голосовое сообщение, и Войси поставит его в очередь на расшифровку. Команда /language меняет язык интерфейса бота.

  Старая версия с выбором движка доступна в @voicy_legacy_bot.
