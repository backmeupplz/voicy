help: "\U0001F60E *Войси* переводит голосовые сообщения и аудио файлы (.ogg, .flac, .wav, .mp3) в текст, ставя их в очередь на расшифровку.\n\nВы можете использовать *Войси* в личных сообщениях или добавить его в группу. Если вам нужна старая версия с выбором движка распознавания, она теперь живет в @voicy_legacy_bot.\n\n/help — Это сообщение \U0001F631\n/language — Выбор языка интерфейса бота \U0001F4E3\n/lock — Включает и выключает обработку команд, отправленных не админами в групповых чатах \U0001F511\n/files — Включает и выключает обработку аудио файлов \U0001F4C1\n/silent — Включает и выключает тихий режим без лишних статусных сообщений \U0001F636\n/privacy — Политика конфиденциальности\n/transcribeAll — включает и выключает расшифровку всех голосовых сообщений в этом чате (только для групп и супергрупп)\n/transcribe — ставит в очередь конкретное голосовое сообщение\n\nВойси работает на вычислениях для расшифровки. Используйте /donate, если хотите помочь оплачивать их. Спасибо!"
