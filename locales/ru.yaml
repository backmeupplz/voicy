files_false: "\U0001F4C1 Великолепно! *Войси* теперь будет *игнорировать* все аудио файлы в этом чате."
files_true: "\U0001F4C1 Великолепно! *Войси* теперь будет *пробовать перевести в текст* все аудио файлы в этом чате."
google: 'Ответьте на это сообщение с файлом аутентификации для Google Cloud (.json), чтобы настроить распознавание речи от Google Speech. Не уверены, как сделать, чтобы все заработало? Прочитайте [наше короткое руководство](https://medium.com/@nikitakolmogorov/%D1%83%D1%81%D1%82%D0%B0%D0%BD%D0%BE%D0%B2%D0%BA%D0%B0-google-speech-%D0%B2-voicybot-9f8268cd58c6).'
google_error_doc: 'Ответьте, пожалуйста, аутентификационным документом.'
google_error_mime: "Пожалуйста, убедитесь, что тип документа — 'text/plain'."
google_success: 'Поздравляем! *Войси* получил аутентификационный документ для *${projectId}* проекта Google Cloud. Теперь вы можете использовать движок Google Speech в этом чате.'
help: |-
  😎 *Войси* переводит в текст все голосовые сообщения и аудио файлы (.ogg, .flac, .wav, .mp3), которые получает. Вы можете использовать *Войси* в личных сообщениях или добавить его в группу.

  Если вы хотите использовать *Войси* в приватных сообщениях с другими людьми, то, пожалуйста, создайте приватную группу с собеседником и добавьте туда *Войси*. Если хотите добавить *Войси* в групповой чат, то, пожалуйста, добавьте его, как собеседника в профиле группы, или в профиле *Войси*.

  /help — Это сообщение 😱
  /language — Выбор языка интерфейса бота 📣
  /lock — Включает и выключает обработку команд, отправленных не админами в групповых чатах 🔑
  /files — Включает и выключает обработку аудио файлов 📁
  /silent — Включает и выключает тихий режим, когда *Войси* не посылает лишних сообщений типа `Распознавание речи инициировано` 😶
  /privacy — Политика конфиденциальности
  /transcribeAll — для включения расшифровки всех голосовых сообщений в чате (эффективно только для групповых/супергрупповых чатов).
  /transcribe - расшифровать конкретное голосовое сообщение

  Донаты оплачивают вычисления для расшифровки голосовых сообщений в Войси. Если вам нужен старый Войси с выбором движка, он будет жить отдельно как @voicy_legacy_bot.
