pay: |
  Войси превращает аудио в текст с помощью локальных вычислений. Это сохраняет расшифровку приватной и не отправляет ваше аудио в сторонние API для транскрибации.

  Локальные вычисления стоят денег. Единоразовый донат включает Войси в этом чате и помогает нам добавить больше вычислительных мощностей.

  Донаты привязаны к чату, а не к пользователю. Если вы донатите в личных сообщениях с Войси, Войси включится в вашем личном чате. Если хотите включить группу, отправьте /donate внутри этой группы.

  Выберите сумму в Telegram Stars ниже. Оплата через Stripe тоже доступна: отправьте <code>/donate 15.69</code>, чтобы заплатить любую сумму с минимумом $6.99. Также можно отправить токены минимум на $6.99 на <code>borodutch.eth</code> и переслать транзакцию @borodutch.
pay_custom: |
  Задонатьте <b>${amount}</b>, чтобы включить расшифровку голосовых в этом чате.

  Будет включен только этот чат.
pay_amount_too_low: |
