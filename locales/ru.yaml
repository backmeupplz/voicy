  Отправьте голосовое сообщение, и Войси превратит его в текст. Команда /language меняет язык интерфейса бота.

  Старая версия с выбором движка доступна в @voicy\_legacy\_bot. Код Войси открыт: https://github.com/backmeupplz/voicy. Поддержка: @golden\_borodutch\_chat.
