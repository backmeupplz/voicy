start: |
  👋 Hola. *Voicy* convierte mensajes de voz y archivos de audio (.ogg, .flac, .wav, .mp3) en texto.

  Envía un mensaje de voz y Voicy lo convertirá en texto. Usa /language para cambiar el idioma de la interfaz del bot.

  Voicy es de código abierto: https://github.com/backmeupplz/voicy.
