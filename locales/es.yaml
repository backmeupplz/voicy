help: |
  😎 *Voicy* convierte mensajes de voz y archivos de audio (.ogg, .flac, .wav, .mp3) en texto.

  Envía un mensaje de voz en un chat privado o añade Voicy a un grupo. En grupos, Voicy puede convertir todos los mensajes de voz en texto o esperar a que alguien responda a un mensaje con /transcribe.

  /start — iniciar Voicy
  /help — mostrar este mensaje
  /id — mostrar IDs del chat y del usuario
  /language — cambiar el idioma de la interfaz del bot
  /donate — activar la transcripción de voz para este chat
  /files — activar o desactivar archivos de audio
  /silent — activar o desactivar mensajes de estado adicionales
  /lock — restringir comandos a administradores del grupo
  /transcribe\_all — convertir todos los mensajes de voz de este grupo en texto
  /transcribe — convertir en texto el mensaje de voz o audio al que respondes
  /privacy — abrir la política de privacidad

  Voicy ahora usa workers para convertir mensajes en texto. Voicy es de código abierto: https://github.com/backmeupplz/voicy.
