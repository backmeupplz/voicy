files_true: "\U0001F4C1 Voicy will turn supported audio files from this chat into text."
help: |
  😎 *Voicy* turns voice messages and audio files (.ogg, .flac, .wav, .mp3) into text.

  Send a voice message in a private chat, or add Voicy to a group. In groups, Voicy can either turn every voice message into text or wait until someone replies to a message with /transcribe.

  /start — Start Voicy
  /help — Show this message
  /id — Show chat and user IDs
  /language — Change the bot interface language
  /donate — Activate voice transcription for this chat
  /files — Toggle audio files
  /silent — Toggle extra status messages
  /lock — Restrict commands to group admins
  /transcribe\_all — Turn every voice message in this group into text
  /transcribe — Turn the voice or audio message you reply to into text
  /privacy — Open the privacy policy

  Voicy now uses workers to turn messages into text. Voicy is open source: https://github.com/backmeupplz/voicy.
