start: |
  👋 Hello. *Voicy* turns voice messages and audio files (.ogg, .flac, .wav, .mp3) into text.

  Send a voice message and Voicy will turn it into text. Use /language to change the bot interface language.

  The old engine-based bot is available at @voicy_legacy_bot.
  Voicy is open source: https://github.com/backmeupplz/voicy
