files_false: "\U0001F4C1 Wonderful! *Voicy* will *ignore* all audio files in this chat from now on."
files_true: "\U0001F4C1 Wonderful! *Voicy* will *queue supported audio files* in this chat for transcription from now on."
google: 'Google Speech setup belongs to legacy Voicy. This version queues audio for transcription workers, so you do not need to upload Google Cloud credentials here. If you need the old engine-based flow, use @voicy_legacy_bot.'
google_error_mime: "Sorry, document's mime type should be 'text/plain'."
google_success: 'Thanks. This chat is ready to use queued Voicy transcription.'
help: "\U0001F60E *Voicy* converts voice messages and audio files (.ogg, .flac, .wav, .mp3) into text by queueing them for transcription.\n\nYou can talk to *Voicy* in a private chat or add it to a group. If you want to use the older engine-based Voicy, it now lives at @voicy_legacy_bot.\n\n/help — Shows this message \U0001F631\n/language — Lets you pick the bot interface language \U0001F4E3\n/lock — Toggles lock or unlock of non-admins using commands in group chats \U0001F511\n/files — Toggles if the bot should attempt to convert audio files or just ignore them \U0001F4C1\n/silent — Toggles silent mode when no extra status messages are sent \U0001F636\n/privacy — Privacy policy\n/transcribeAll — Toggles transcribing all voice messages in this chat (group and supergroup chats only)\n/transcribe — Transcribes a specific voice message\n\nVoicy runs on transcription compute. Use /donate if you want to help keep it running. Thank you!"
error_group: "\U0001F605 Sorry, but this command only works in group chats."
lock_true: "\U0001F511 Great! *Voicy* will now respond only to command calls sent by *admins* in this chat."
lock_false: "\U0001F511 Great! *Voicy* will now respond only to command calls from *anyone* in this chat."
silent_true: "\U0001F636 Magnificent! *Voicy* will now work in *silent mode*: it will not send any messages to the chat except for the final transcriptions."
silent_false: "\U0001F60F Magnificent! *Voicy* will now work in *usual mode*: it will send status messages after it receives voice messages."
start: "\U0001F44B Hello there! *Voicy* converts voice messages and audio files (.ogg, .flac, .wav, .mp3) into text.\n\nSend a voice message and Voicy will queue it for transcription. Use /language to change the bot interface language. The legacy engine-based bot is available at @voicy_legacy_bot.\n"
engine: "\U0001F44B Engine selection is part of legacy Voicy. This version queues audio for transcription workers automatically. Use @voicy_legacy_bot if you need the old engine-based flow."
engine_success: "\U0001F44D Voicy will queue audio for transcription in this chat. Use /language to change the bot interface language."
language: "\U0001F44B Please select the bot interface language"
language_without_engine: "\U0001F44B Please select the bot interface language"
language_success: "\U0001F44D Now *Voicy* uses *${language}* for bot messages in this chat. Thank you!"
