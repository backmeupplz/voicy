files_false: "\U0001F4C1 Voicy will ignore audio files in this chat."
files_true: "\U0001F4C1 Voicy will queue supported audio files from this chat for transcription."
help: |
  😎 *Voicy* turns voice messages and audio files (.ogg, .flac, .wav, .mp3) into text.

  Send a voice message in a private chat, or add Voicy to a group. In groups, Voicy can either transcribe every voice message or wait until someone replies to a message with /transcribe.

  /help — Show this message
  /language — Change the bot interface language
  /donate — Help pay for transcription compute
  /files — Toggle audio file transcription
  /silent — Toggle extra status messages
  /lock — Restrict commands to group admins
  /privacy — Open the privacy policy
  /transcribe\_all — Toggle transcription for every voice message in this group
  /transcribe — Transcribe the voice or audio message you reply to

  Voicy now uses queued transcription workers. The old engine-based bot is available at @voicy_legacy_bot.
error_group: "\U0001F605 This command only works in group chats."
lock_true: "\U0001F511 Voicy will now accept commands only from group admins."
lock_false: "\U0001F511 Voicy will now accept commands from anyone in this chat."
silent_true: "\U0001F636 Silent mode is on. Voicy will only send final transcriptions."
silent_false: "\U0001F60F Silent mode is off. Voicy will send queue and status messages."
start: |
  👋 Hello. *Voicy* turns voice messages and audio files (.ogg, .flac, .wav, .mp3) into text.

  Send a voice message and Voicy will queue it for transcription. Use /language to change the bot interface language.

  The old engine-based bot is available at @voicy_legacy_bot.
