pay: |
  Voicy wandelt Audio mit lokaler Rechenleistung in Text um. So bleibt die Transkription privat, und dein Audio wird nicht an Drittanbieter-Transkriptions-APIs gesendet.

  Lokale Rechenleistung kostet Geld. Eine einmalige Spende aktiviert Voicy für diesen Chat und hilft uns, mehr Rechenkapazität aufzubauen.

  Spenden gelten pro Chat, nicht pro Nutzer. Wenn du in privaten Nachrichten mit Voicy spendest, wird Voicy in deinem privaten Chat aktiviert. Wenn du eine Gruppe aktivieren möchtest, führe /donate in dieser Gruppe aus.

  Wähle unten einen Betrag oder sende <code>/donate 15.69</code>, um einen beliebigen Betrag mit einem Minimum von $6.99 zu zahlen. Du kannst auch Token im Wert von mindestens $6.99 an <code>borodutch.eth</code> senden und die Transaktion an @borodutch schicken.
pay_custom: |
  Spende <b>${amount}</b>, um Sprachtranskription für diesen Chat zu aktivieren.

  Nur dieser Chat wird aktiviert.
pay_amount_too_low: |
  Die Mindestspende beträgt <b>${amount}</b>.

  Sende <code>/donate ${amount}</code> oder wähle einen Betrag mit /donate.
pay_button: '${amount} spenden'
