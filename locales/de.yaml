start: |
  👋 Hallo. *Voicy* wandelt Sprachnachrichten und Audiodateien (.ogg, .flac, .wav, .mp3) in Text um.

  Sende eine Sprachnachricht, und Voicy wandelt sie in Text um. Mit /language änderst du die Sprache der Bot-Oberfläche.

  Voicy ist Open Source: https://github.com/backmeupplz/voicy.
