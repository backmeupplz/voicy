files_false: "📁 Voicy ignoriert Audiodateien in diesem Chat."
files_true: "📁 Voicy wandelt unterstützte Audiodateien aus diesem Chat in Text um."
help: |
  😎 *Voicy* wandelt Sprachnachrichten und Audiodateien (.ogg, .flac, .wav, .mp3) in Text um.

  Sende eine Sprachnachricht in einem privaten Chat oder füge Voicy zu einer Gruppe hinzu. In Gruppen kann Voicy entweder jede Sprachnachricht in Text umwandeln oder warten, bis jemand mit /transcribe auf eine Nachricht antwortet.

  /start — Voicy starten
  /help — diese Hilfe anzeigen
  /id — Chat- und Nutzer-IDs anzeigen
  /language — Sprache der Bot-Oberfläche ändern
  /donate — Sprachtranskription für diesen Chat aktivieren
  /files — Audiodateien ein- oder ausschalten
  /silent — zusätzliche Statusmeldungen ein- oder ausschalten
  /lock — Befehle auf Gruppenadmins beschränken
  /transcribe\_all — jede Sprachnachricht in dieser Gruppe in Text umwandeln
  /transcribe — die Sprachnachricht oder Audiodatei transkribieren, auf die du antwortest
  /privacy — Datenschutzerklärung öffnen

  Voicy nutzt jetzt Worker, um Nachrichten in Text umzuwandeln. Voicy ist Open Source: https://github.com/backmeupplz/voicy.
error_group: "😅 Dieser Befehl funktioniert nur in Gruppenchats."
